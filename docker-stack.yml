version: "3.8"

services:
  db:
    image: postgres:${POSTGRES_IMAGE_TAG}
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=${TZ}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager  # Standard practice for single-node DB, adjust as needed

  mattermost:
    image: mattermost/${MATTERMOST_IMAGE}:${MATTERMOST_IMAGE_TAG}
    depends_on:
      - db
    environment:
      - TZ=${TZ}
      - MM_SQLSETTINGS_DRIVERNAME=${MM_SQLSETTINGS_DRIVERNAME}
      - MM_SQLSETTINGS_DATASOURCE=${MM_SQLSETTINGS_DATASOURCE}
      - MM_SERVICESETTINGS_SITEURL=${MM_SERVICESETTINGS_SITEURL}
      - MM_BLEVESETTINGS_INDEXDIR=${MATTERMOST_BLEVE_INDEXES_PATH}
    ports:
      - target: 8065
        published: 31201
        protocol: tcp
        mode: ingress
    volumes:
      - ${MATTERMOST_CONFIG_PATH}:/mattermost/config:rw
      - ${MATTERMOST_DATA_PATH}:/mattermost/data:rw
      - ${MATTERMOST_LOGS_PATH}:/mattermost/logs:rw
      - ${MATTERMOST_PLUGINS_PATH}:/mattermost/plugins:rw
      - ${MATTERMOST_CLIENT_PLUGINS_PATH}:/mattermost/client/plugins:rw
      - ${MATTERMOST_BLEVE_INDEXES_PATH}:/mattermost/bleve-indexes:rw
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  coturn:
    image: coturn/coturn:latest
    environment:
      - TZ=${TZ}
    command:
      - -n
      - --log-file=stdout
      - --lt-cred-mech
      - --fingerprint
      - --no-stdout-log
      - --listening-port=3478
      - --min-port=31202
      - --max-port=31252
      - --realm=${TURN_REALM}
      - --user=${TURN_USER}:${TURN_PASSWORD}
      - --external-ip=${TURN_EXTERNAL_IP}
    ports:
      # STUN/TURN Ports in host mode for media traffic efficiency
      - target: ${TURN_PORT}
        published: 3478
        protocol: tcp
        mode: host
      - target: ${TURN_PORT}
        published: 3478
        protocol: udp
        mode: host
      # Relay port range (must be host mode for UDP relay to work correctly in Swarm)
      - target: ${TURN_MIN_PORT}-${TURN_MAX_PORT}
        published: 31202-31252
        protocol: udp
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
