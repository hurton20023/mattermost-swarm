version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro # Using the correct cert folder
    networks:
      - mattermost-net
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  db:
    image: postgres:13-alpine
    environment:
      - POSTGRES_USER=mmuser
      - POSTGRES_PASSWORD=most-secret-password-change-me
      - POSTGRES_DB=mattermost
      - TZ=UTC
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
    networks:
      - mattermost-net
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  mattermost:
    image: mattermost/mattermost-team-edition:9.5.2
    depends_on:
      - db
    environment:
      - TZ=UTC
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=postgres://mmuser:most-secret-password-change-me@db:5432/mattermost?sslmode=disable&connect_timeout=10
      - MM_SERVICESETTINGS_SITEURL=https://192.168.1.146
      - MM_BLEVESETTINGS_INDEXDIR=/mattermost/bleve-indexes
    networks:
      - mattermost-net
    volumes:
      - ./volumes/app/config:/mattermost/config:rw
      - ./volumes/app/data:/mattermost/data:rw
      - ./volumes/app/logs:/mattermost/logs:rw
      - ./volumes/app/plugins:/mattermost/plugins:rw
      - ./volumes/app/client/plugins:/mattermost/client/plugins:rw
      - ./volumes/app/bleve-indexes:/mattermost/bleve-indexes:rw
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  coturn:
    image: coturn/coturn:latest
    environment:
      - TZ=UTC
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf:ro
    command: -c /etc/turnserver.conf
    networks:
      - mattermost-net
    ports:
      # STUN/TURN Ports remain published directly (Host mode bypasses proxy)
      - target: 3478
        published: 3478
        protocol: tcp
        mode: host
      - target: 3478
        published: 3478
        protocol: udp
        mode: host
      # Relay port range
      - target: 31202
        published: 31202
        protocol: udp
        mode: host
      - target: 31203
        published: 31203
        protocol: udp
        mode: host
      - target: 31204
        published: 31204
        protocol: udp
        mode: host
      - target: 31205
        published: 31205
        protocol: udp
        mode: host
      - target: 31206
        published: 31206
        protocol: udp
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

networks:
  mattermost-net:
    driver: overlay
    attachable: true
