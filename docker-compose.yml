version: "3.8"

services:
  db:
    image: postgres:${POSTGRES_IMAGE_TAG}
    restart: ${RESTART_POLICY}
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=${TZ}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data

  mattermost:
    depends_on:
      - db
    image: mattermost/${MATTERMOST_IMAGE}:${MATTERMOST_IMAGE_TAG}
    restart: ${RESTART_POLICY}
    environment:
      # Timezone inside container
      - TZ=${TZ}
      # Necessary Mattermost options/variables
      - MM_SQLSETTINGS_DRIVERNAME=${MM_SQLSETTINGS_DRIVERNAME}
      - MM_SQLSETTINGS_DATASOURCE=${MM_SQLSETTINGS_DATASOURCE}
      # Additional settings
      - MM_SERVICESETTINGS_SITEURL=${MM_SERVICESETTINGS_SITEURL}
      - MM_BLEVESETTINGS_INDEXDIR=${MATTERMOST_BLEVE_INDEXES_PATH}
    ports:
      - "${APP_PORT}:8065"
    volumes:
      - ${MATTERMOST_CONFIG_PATH}:/mattermost/config:rw
      - ${MATTERMOST_DATA_PATH}:/mattermost/data:rw
      - ${MATTERMOST_LOGS_PATH}:/mattermost/logs:rw
      - ${MATTERMOST_PLUGINS_PATH}:/mattermost/plugins:rw
      - ${MATTERMOST_CLIENT_PLUGINS_PATH}:/mattermost/client/plugins:rw
      - ${MATTERMOST_BLEVE_INDEXES_PATH}:/mattermost/bleve-indexes:rw

  coturn:
    image: coturn/coturn:latest
    restart: ${RESTART_POLICY}
    environment:
      - TZ=${TZ}
    # We use command to configure coturn. Alternatively, a turnserver.conf can be used.
    command:
      - -n
      - --log-file=stdout
      - --lt-cred-mech
      - --fingerprint
      - --no-stdout-log
      - --listening-port=${TURN_PORT}
      - --min-port=${TURN_MIN_PORT}
      - --max-port=${TURN_MAX_PORT}
      - --realm=${TURN_REALM}
      - --user=${TURN_USER}:${TURN_PASSWORD}
      - --external-ip=${TURN_EXTERNAL_IP}
    ports:
      - "${TURN_PORT}:${TURN_PORT}"
      - "${TURN_PORT}:${TURN_PORT}/udp"
      - "${TURN_MIN_PORT}-${TURN_MAX_PORT}:${TURN_MIN_PORT}-${TURN_MAX_PORT}/udp"
